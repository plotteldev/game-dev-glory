name: game-dev-glory
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
ingress:
  rules:
    - component:
        name: web
      match:
        path:
          prefix: /
services:
  - name: web
    environment_slug: node-js
    github:
      repo: plotteldev/game-dev-glory
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: npm run build
    run_command: npm run start
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /
    envs:
      - key: NEXT_PUBLIC_STRIPE_COACHING_PAYMENT_LINK
        value: https://buy.stripe.com/3cIfZi2oT2YYet3flr1kA01
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: NEXT_PUBLIC_STRIPE_CUSTOMER_PORTAL_URL
        value: https://billing.stripe.com/p/login/14AeVegfJeHGacNehn1kA00
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: NEXT_PUBLIC_DISCORD_INVITE_URL
        value: https://discord.gg/NQeegWAAJM
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
